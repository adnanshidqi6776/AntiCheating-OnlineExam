<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <title>Home - Sistem Ujian</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
      }

      .container {
        margin-top: 30px;
      }

      video {
        width: 400px;
        border-radius: 10px;
        transform: scaleX(-1);
      }

      input {
        padding: 10px;
        margin: 10px;
        width: 250px;
      }

      button {
        padding: 12px 30px;
        font-size: 16px;
        cursor: pointer;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>SISTEM UJIAN ONLINE</h2>

      <video id="video" autoplay></video>

      <br />

      <input id="nama" type="text" placeholder="Nama (huruf)" />

      <br />

      <input id="nim" type="text" placeholder="NIM (angka)" />

      <br />

      <input id="limit" type="number" placeholder="Max Kecurangan (>1)" />

      <br />

      <button onclick="startExam()">START UJIAN</button>

      <p id="error" class="error"></p>
    </div>
  </body>

  <script>
    let video = document.getElementById("video");

    let stream;

    // START WEBCAM

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
      });

      video.srcObject = stream;
    }

    startCamera();

    // VALIDATION

    function validateInput(nama, nim, limit) {
      const nameRegex = /^[A-Za-z ]+$/;

      const nimRegex = /^[0-9]+$/;

      if (!nameRegex.test(nama)) {
        return "Nama harus huruf";
      }

      if (!nimRegex.test(nim)) {
        return "NIM harus angka";
      }

      if (limit < 1) {
        return "Max kecurangan minimal 1";
      }

      return null;
    }

    // START EXAM

    async function startExam() {
      let nama = document.getElementById("nama").value;

      let nim = document.getElementById("nim").value;

      let limit = document.getElementById("limit").value;

      let error = validateInput(nama, nim, limit);

      if (error) {
        document.getElementById("error").innerText = error;

        return;
      }

      document.getElementById("error").innerText = "";

      // CALL SERVER

      let response = await fetch("/start_exam", {
        method: "POST",

        headers: {
          "Content-Type": "application/json",
        },

        body: JSON.stringify({
          nama: nama,

          nim: nim,

          limit: limit,
        }),
      });

      let result = await response.json();

      if (result.status === "ok") {
        // stop webcam

        stream.getTracks().forEach((track) => track.stop());

        // redirect

        window.location.href =
          "/test" +
          "?nama=" +
          encodeURIComponent(nama) +
          "&nim=" +
          encodeURIComponent(nim) +
          "&limit=" +
          encodeURIComponent(limit);
      }
    }
  </script>
</html>
