<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Test Page</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      .container {
        display: flex;
        height: 100vh;
      }

      /* LEFT PANEL */

      .left {
        width: 80px;
        background: #eee;
        padding: 10px;
      }

      .question-btn {
        width: 100%;
        padding: 10px;
        margin-bottom: 5px;
        cursor: pointer;
      }

      /* CENTER */

      .center {
        flex: 1;
        padding: 20px;
      }

      textarea {
        width: 100%;
        height: 200px;
      }

      /* RIGHT */

      .right {
        width: 450px;
        padding: 10px;
      }

      canvas {
        border: 1px solid black;
      }

      /* WARNING */

      #warning {
        position: fixed;
        top: 20px;
        right: 20px;
        background: red;
        color: white;
        padding: 15px;
        border-radius: 10px;
        display: none;
        font-weight: bold;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <div id="warning">⚠️ Kecurangan terdeteksi!</div>

    <div class="container">
      <!-- LEFT -->

      <div class="left" id="questionButtons"></div>

      <!-- CENTER -->

      <div class="center">
        <h3 id="questionText"></h3>

        <textarea id="answerBox"></textarea>

        <br /><br />

        <button onclick="endExam()">END</button>
      </div>

      <!-- RIGHT -->

      <div class="right">
        <canvas id="canvas"></canvas>

        <p>
          Pelanggaran:
          <span id="count">0</span>
        </p>
      </div>
    </div>

    <script>
      let params = new URLSearchParams(window.location.search);

      let nama = params.get("nama");

      let limit = parseInt(params.get("limit"));

      let count = 0;

      let questions = [
        "Jelaskan pengertian Artificial Intelligence",

        "Apa itu Machine Learning",

        "Jelaskan fungsi dataset",

        "Apa itu overfitting",

        "Perbedaan classification dan regression",

        "Apa itu Computer Vision",

        "Jelaskan deep learning",

        "Apa fungsi convolution layer",

        "Apa itu object detection",

        "Peran YOLO dalam object detection",
      ];

      let answers = new Array(10).fill("");

      let currentQuestion = 0;

      /* CREATE QUESTION BUTTONS */

      function createButtons() {
        let container = document.getElementById("questionButtons");

        for (let i = 0; i < 10; i++) {
          let btn = document.createElement("button");

          btn.innerText = i + 1;

          btn.className = "question-btn";

          btn.onclick = () => showQuestion(i);

          container.appendChild(btn);
        }
      }

      createButtons();

      function showQuestion(index) {
        answers[currentQuestion] = document.getElementById("answerBox").value;

        currentQuestion = index;

        document.getElementById("questionText").innerText = questions[index];

        document.getElementById("answerBox").value = answers[index];
      }

      showQuestion(0);

      /* CAMERA */

      let canvas = document.getElementById("canvas");

      let ctx = canvas.getContext("2d");

      let video = document.createElement("video");

      let stream;

      async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: 400,
            height: 300,
          },
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          video.play();

          // SET RESOLUSI CANVAS
          canvas.width = 400;
          canvas.height = 300;
        };

        drawLoop();
      }

      startCamera();

      /* DRAW LOOP */

      let boxes = [];

      function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // mirror video saja
        ctx.save();

        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        ctx.restore();

        drawBoxes();

        requestAnimationFrame(drawLoop);
      }

      /* DETECTION LOOP */

      setInterval(sendFrame, 1000);

      function sendFrame() {
        canvas.toBlob(async (blob) => {
          let formData = new FormData();

          formData.append("image", blob);

          formData.append("nama", nama);

          let res = await fetch("/detect", {
            method: "POST",
            body: formData,
          });

          let data = await res.json();

          console.log("Detection result:", data);

          boxes = data.boxes;

          handleViolation(data);
        });
      }

      /* DRAW BOXES */

      function drawBoxes() {
        if (!video.videoWidth) return;

        ctx.font = "16px Arial";
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.fillStyle = "red";

        boxes.forEach((b) => {
          if (b.confidence < 0.57) return;

          let [x1, y1, x2, y2] = b.bbox;

          let width = x2 - x1;
          let height = y2 - y1;

          ctx.strokeRect(x1, y1, width, height);

          ctx.fillText(b.label + " " + b.confidence, x1, y1 - 5);
        });
      }

      /* WARNING */

      let warning = document.getElementById("warning");

      function showWarning() {
        warning.style.display = "block";
      }

      function hideWarning() {
        warning.style.display = "none";
      }

      /* RECORDING */

      let mediaRecorder;

      let recordedChunks = [];

      let isRecording = false;

      function startRecording() {
        if (isRecording) return;

        let stream = canvas.captureStream(15);

        mediaRecorder = new MediaRecorder(stream, {
          mimeType: "video/mp4",
          videoBitsPerSecond: 1500000,
        });

        recordedChunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.start();

        isRecording = true;
      }

      function stopRecording() {
        if (!isRecording) return;

        mediaRecorder.stop();

        mediaRecorder.onstop = async () => {
          let blob = new Blob(recordedChunks, {
            type: "video/mp4",
          });

          let formData = new FormData();

          formData.append("video", blob);

          formData.append("nama", nama);

          await fetch("/save_video", {
            method: "POST",
            body: formData,
          });
        };

        isRecording = false;
      }

      /* VIOLATION HANDLER */

      let lastDetect = false;

      async function handleViolation(data) {
        if (data.detected) {
          showWarning();

          startRecording();

          lastDetect = true;

          await fetch("/violation_event", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nama: nama,
              detected: true,
              confidence: data.confidence,
              label: data.label,
            }),
          });
        } else {
          hideWarning();

          if (lastDetect) {
            stopRecording();

            lastDetect = false;

            let res = await fetch("/violation_event", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                nama: nama,
                detected: false,
                confidence: data.confidence,
                label: data.label,
              }),
            });

            let result = await res.json();

            if (result.action === "force_end") {
              alert("Ujian dihentikan karena pelanggaran mencapai maksimum");

              endExam();
            }

            if (result.count !== undefined) {
              count = result.count;

              document.getElementById("count").innerText = count;

              setTimeout(resetCooldown, 5000);
            }
          }
        }
      }

      async function resetCooldown() {
        await fetch("/reset_cooldown", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nama: nama,
          }),
        });
      }

      /* END EXAM */

      async function endExam() {
        answers[currentQuestion] = document.getElementById("answerBox").value;

        await fetch("/save_answers", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nama: nama,

            answers: answers,
          }),
        });

        stream.getTracks().forEach((track) => track.stop());

        window.location.href = "/";
      }
    </script>
  </body>
</html>
